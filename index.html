<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOBAR</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/index.js"></script>

</head>
<body>

<header>

    <div class="header-left">

        <div class="logo">
            NOBAR
        </div>

        <a
            href="https://starballtv09.blogspot.com/"
            target="_blank"
            class="fifa-header"
        >
            <span class="fifa-icon">🏆</span>

            <div class="fifa-info">
                <div class="fifa-title">
                    FIFA 2026™
                </div>

                <div class="fifa-subtitle">
                    World Cup
                </div>
            </div>
        </a>

    </div>

    <div class="room-info">
        <span id="roomDisplay">Room: -</span>
        <span id="onlineCount">Online: -</span>
    </div>

</header>

<div class="container">
    <div class="sidebar">
        <div id="joinPanel">
            <h3>Gabung Room</h3>
            <input type="text" id="username" placeholder="Masuakan Namo">
            <input type="text" id="joinRoomId" placeholder="Room ID = 123">
            <input type="password" id="joinPassword" placeholder="Password = 123">
            <button id="joinRoomBtn" disabled>Gabung</button>
            <hr>
        </div>
</div>

<div class="content">
    <div class="video-wrapper">
        <video
            id="videoPlayer"
            controls
            playsinline
            preload="metadata"
            crossorigin="anonymous">
        </video>

        <div class="video-actions">
            <button id="fullscreenBtn">Fullscreen</button>
        </div>
    </div>

    <div class="bottom-section">
        <div class="chat-card">
            <div class="card-header">Chat Room</div>
            <div id="chatMessages" class="chat-messages"></div>

            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Ketik pesan...">
                <button id="sendMessageBtn">Kirim</button>
            </div>
        </div>

        <div class="user-card">
            <div class="card-header">Peserta Online</div>
                <div id="userList">
                    <div class="empty">Belum ada peserta</div>
                </div>
        </div>
    </div>
</div>
</div>

<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h2>Password Room</h2>
        <input type="password" id="modalPassword" placeholder="Masukkan Password">
        <button id="submitPassword">Masuk</button>
    </div>
</div>

<div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <p>Menghubungkan...</p>
</div>

</body>
</html>
